         not loaded from Google's CDN - the old <link>-based approach here
         depended on the browser being able to reach fonts.googleapis.com /
         fonts.gstatic.com at runtime, which ad blockers and privacy
         extensions commonly block, silently falling back to the OS's
         default UI font with no visible error. Self-hosting removes that
         entire failure mode. -->
